<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Pet Nap</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <!-- 顶部 -->
    <header class="hdr">
      <div class="hdr-left">
        <img src="assets/icon-48.png" alt="" class="hdr-icon" />
        <div>
          <div class="hdr-title">Pet Nap</div>
          <div class="hdr-sub">宠物打盹 · 陪你休息</div>
        </div>
      </div>
      <label class="toggle" title="总开关">
        <input type="checkbox" id="enabled" checked />
        <span class="toggle-slider"></span>
      </label>
    </header>

    <!-- 当前宠物预览 -->
    <section class="card pet-card">
      <div class="pet-preview" id="pet-preview"></div>
      <div class="pet-meta">
        <div class="pet-name" id="pet-name">--</div>
        <div class="pet-status" id="pet-status">--</div>
      </div>
      <button class="btn primary small" id="play-now">陪我一下</button>
    </section>

    <!-- 时长预设 -->
    <section class="card">
      <div class="time-row">
        <span class="time-label">使用</span>
        <div class="chips" data-key="usageLimit">
          <button data-value="15">15 分</button>
          <button data-value="25">25 分</button>
          <button data-value="45">45 分</button>
          <button data-value="60">60 分</button>
        </div>
      </div>
      <div class="time-row">
        <span class="time-label">休息</span>
        <div class="chips" data-key="breakTime">
          <button data-value="1">1 分</button>
          <button data-value="3">3 分</button>
          <button data-value="5">5 分</button>
        </div>
      </div>
    </section>

    <!-- 宠物库 -->
    <section class="card">
      <div class="section-title">
        <span>选择你的萌宠</span>
        <button class="btn small ghost" id="add-pet">+ 上传</button>
      </div>
      <div class="pet-grid" id="pet-grid"></div>
    </section>

    <!-- 更多设置（折叠） -->
    <details class="more-card">
      <summary>
        <span>更多设置</span>
        <span class="chev">›</span>
      </summary>
      <div class="more-body">
        <div class="tab-row">
          <label class="pill">
            <input type="radio" name="mode" value="domain" checked />
            <span>只在特定网站</span>
          </label>
          <label class="pill">
            <input type="radio" name="mode" value="global" />
            <span>所有网站</span>
          </label>
        </div>
        <div id="domains-wrap">
          <textarea id="domains" placeholder="每行一个域名"></textarea>
        </div>
        <label class="check-label">
          <input type="checkbox" id="idleRoaming" checked />
          <span>闲时宠物在页面角落漫游</span>
        </label>
        <label class="check-label">
          <input type="checkbox" id="hardBlock" />
          <span>强制模式（休息时禁止滚动）</span>
        </label>
      </div>
    </details>

    <footer class="ftr">
      <span>v0.1.0 · MIT</span>
      <a href="#" id="attributions">致谢</a>
    </footer>

    <!-- 上传弹窗 -->
    <div id="upload-modal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-title">上传我家宠物</div>
        <div class="modal-body">
          <div class="upload-slot" id="upload-slot">
            <input type="file" id="file-input" accept="image/*" hidden />
            <div class="upload-hint" id="upload-hint">点击 / 拖入宠物照片<br><small>建议：宠物居中 · 背景简单</small></div>
            <img id="upload-preview" alt="" />
          </div>
          <label class="check-label" style="margin-top:12px">
            <input type="text" id="pet-name-input" placeholder="给它起个名字（可选）" maxlength="12" />
          </label>
          <div class="upload-tools" id="upload-tools" style="display:none">
            <button class="btn small ghost" id="rm-bg">尝试抠掉背景</button>
            <span class="tool-hint" id="rm-bg-hint"></span>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn ghost" id="upload-cancel">取消</button>
          <button class="btn primary" id="upload-save" disabled>保存</button>
        </div>
      </div>
    </div>

    <!-- 致谢弹窗 -->
    <div id="attr-modal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-title">致谢 · Attributions</div>
        <div class="modal-body attr-body">
          <p><b>Pet Nap</b> 的时间跟踪 + Shadow DOM 覆盖层机制参考自 <a href="https://github.com/zokuzoku/cat-gatekeeper" target="_blank" rel="noopener">Cat Gatekeeper</a>（MIT © zokuzoku）。</p>
          <p>本扩展的所有素材（图标、SVG 预设宠物）均为原创，与 Cat Gatekeeper 无关联。</p>
          <p>MIT License · 欢迎 Fork 修改</p>
        </div>
        <div class="modal-actions">
          <button class="btn primary" id="attr-close">好的</button>
        </div>
      </div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
