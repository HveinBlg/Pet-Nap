<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="orgBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc082"/>
      <stop offset="1" stop-color="#e8934e"/>
    </linearGradient>
    <radialGradient id="orgBelly" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#fff5e5"/>
      <stop offset="1" stop-color="#ffd9a8"/>
    </radialGradient>
    <radialGradient id="orgCheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd4d4" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffd4d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    @keyframes petBreathe {
      0%, 100% { transform: scale(1, 1); }
      50%      { transform: scale(1.015, 1.03); }
    }
    @keyframes petTailWag {
      0%, 100% { transform: rotate(-12deg); }
      50%      { transform: rotate(14deg); }
    }
    @keyframes petBlink {
      0%, 93%, 100% { transform: scaleY(1); }
      95%, 97%      { transform: scaleY(0.08); }
    }
    @keyframes petEarL {
      0%, 88%, 100% { transform: rotate(0); }
      92%, 94%      { transform: rotate(-14deg); }
    }
    @keyframes petEarR {
      0%, 82%, 100% { transform: rotate(0); }
      86%, 88%      { transform: rotate(12deg); }
    }
    @keyframes petSway {
      0%, 100% { transform: rotate(-1.5deg); }
      50%      { transform: rotate(1.5deg); }
    }

    .body-grp   { transform-origin: 100px 200px; animation: petBreathe 2.6s ease-in-out infinite; }
    .head-grp   { transform-origin: 100px 130px; animation: petSway 4.5s ease-in-out infinite; }
    .tail-grp   { transform-origin: 60px 195px;  animation: petTailWag 2.2s ease-in-out infinite; }
    .eyes-grp   { transform-origin: 100px 92px;  animation: petBlink 4.5s ease-in-out infinite; }
    .ear-left   { transform-origin: 72px 62px;   animation: petEarL 6s ease-in-out infinite; }
    .ear-right  { transform-origin: 128px 62px;  animation: petEarR 7s ease-in-out infinite; }
  </style>

  <!-- Tail (behind body) -->
  <g class="tail-grp">
    <path d="M 60 200 Q 20 205, 22 165 Q 26 130, 78 150 Q 60 170, 60 200 Z"
          fill="#e8934e" stroke="#c07030" stroke-width="1.5"/>
    <path d="M 30 175 Q 26 155, 40 145" stroke="#c07030" stroke-width="2"
          fill="none" stroke-linecap="round"/>
    <path d="M 30 190 Q 22 180, 26 168" stroke="#c07030" stroke-width="1.5"
          fill="none" stroke-linecap="round"/>
  </g>

  <!-- Body -->
  <g class="body-grp">
    <ellipse cx="100" cy="185" rx="66" ry="52" fill="url(#orgBody)"
             stroke="#c07030" stroke-width="1.5"/>
    <!-- Belly -->
    <ellipse cx="100" cy="195" rx="42" ry="38" fill="url(#orgBelly)"/>
    <!-- Body stripes -->
    <path d="M 45 155 Q 65 148, 78 155" stroke="#c07030" stroke-width="3"
          fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 120 155 Q 135 148, 155 158" stroke="#c07030" stroke-width="3"
          fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 55 175 Q 70 172, 82 178" stroke="#c07030" stroke-width="2.5"
          fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M 122 178 Q 138 172, 152 178" stroke="#c07030" stroke-width="2.5"
          fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Front paws -->
    <ellipse cx="72" cy="225" rx="16" ry="12" fill="#e8934e" stroke="#c07030" stroke-width="1.5"/>
    <ellipse cx="128" cy="225" rx="16" ry="12" fill="#e8934e" stroke="#c07030" stroke-width="1.5"/>
    <!-- Paw pads -->
    <ellipse cx="72" cy="230" rx="6" ry="3" fill="#c07030" opacity="0.5"/>
    <ellipse cx="128" cy="230" rx="6" ry="3" fill="#c07030" opacity="0.5"/>
  </g>

  <!-- Head -->
  <g class="head-grp">
    <!-- Ears -->
    <g class="ear-left">
      <path d="M 55 48 L 78 18 L 92 65 Z" fill="#e8934e" stroke="#c07030" stroke-width="1.5"/>
      <path d="M 63 46 L 78 28 L 86 58 Z" fill="#ffc2a2"/>
    </g>
    <g class="ear-right">
      <path d="M 145 48 L 122 18 L 108 65 Z" fill="#e8934e" stroke="#c07030" stroke-width="1.5"/>
      <path d="M 137 46 L 122 28 L 114 58 Z" fill="#ffc2a2"/>
    </g>

    <!-- Face -->
    <ellipse cx="100" cy="95" rx="58" ry="52" fill="url(#orgBody)"
             stroke="#c07030" stroke-width="1.5"/>

    <!-- Forehead stripes -->
    <path d="M 100 55 Q 96 65, 100 75" stroke="#c07030" stroke-width="2.5"
          fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 86 58 Q 84 68, 86 76" stroke="#c07030" stroke-width="2"
          fill="none" stroke-linecap="round" opacity="0.65"/>
    <path d="M 114 58 Q 116 68, 114 76" stroke="#c07030" stroke-width="2"
          fill="none" stroke-linecap="round" opacity="0.65"/>

    <!-- Cheeks (fluffy) -->
    <ellipse cx="100" cy="110" rx="36" ry="18" fill="url(#orgBelly)"/>
    <ellipse cx="70" cy="115" rx="8" ry="6" fill="url(#orgCheek)"/>
    <ellipse cx="130" cy="115" rx="8" ry="6" fill="url(#orgCheek)"/>

    <!-- Eyes -->
    <g class="eyes-grp">
      <ellipse cx="82" cy="92" rx="7" ry="9" fill="#1a1a1a"/>
      <ellipse cx="118" cy="92" rx="7" ry="9" fill="#1a1a1a"/>
      <circle cx="84" cy="88" r="2" fill="white"/>
      <circle cx="120" cy="88" r="2" fill="white"/>
    </g>

    <!-- Nose -->
    <path d="M 94 106 L 106 106 L 100 112 Z" fill="#e88098" stroke="#8b3b4c" stroke-width="0.8"/>
    <!-- Mouth -->
    <path d="M 100 112 Q 100 118, 92 118" stroke="#6b2b1c" stroke-width="1.5"
          fill="none" stroke-linecap="round"/>
    <path d="M 100 112 Q 100 118, 108 118" stroke="#6b2b1c" stroke-width="1.5"
          fill="none" stroke-linecap="round"/>

    <!-- Whiskers -->
    <path d="M 68 108 L 38 104" stroke="#8b5b2c" stroke-width="1" fill="none" opacity="0.7"/>
    <path d="M 68 114 L 38 118" stroke="#8b5b2c" stroke-width="1" fill="none" opacity="0.7"/>
    <path d="M 132 108 L 162 104" stroke="#8b5b2c" stroke-width="1" fill="none" opacity="0.7"/>
    <path d="M 132 114 L 162 118" stroke="#8b5b2c" stroke-width="1" fill="none" opacity="0.7"/>
  </g>
</svg>
