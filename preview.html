<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Pet Nap · 预览</title>
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(135deg, #1a1625 0%, #2d1b3d 50%, #1a1625 100%);
      display: flex; flex-wrap: wrap; align-items: flex-start;
      gap: 40px; padding: 40px 30px;
      justify-content: center;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: white;
    }
    .col { display: flex; flex-direction: column; gap: 20px; align-items: center; }
    .frame {
      background: #111;
      border-radius: 28px;
      padding: 8px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    }
    .popup-frame iframe {
      width: 380px; height: 720px;
      border: none; border-radius: 22px;
      background: white; display: block;
    }
    .video-frame {
      width: 380px;
      border-radius: 22px; overflow: hidden;
      background: linear-gradient(135deg, #2d1b3d, #1a1625);
      padding: 8px;
    }
    .video-frame video {
      width: 100%; display: block;
      border-radius: 14px;
      background: black;
    }
    .caption { font-size: 13px; color: #c0b8c8; text-align: center; }
    .caption b { color: #ffd167; }
    h1 {
      font-size: 30px; margin: 0 0 8px;
      background: linear-gradient(135deg, #ff8fb1, #ffd167);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .info { max-width: 340px; }
    .info p { color: #c0b8c8; font-size: 14px; line-height: 1.7; margin: 0 0 8px; }
    .info small { color: #7f7590; font-size: 12px; }
    .note {
      background: rgba(255,143,177,0.1); border: 1px solid rgba(255,143,177,0.3);
      color: #ff8fb1; font-size: 12px; padding: 10px 14px;
      border-radius: 10px; margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="col">
    <h1>🐾 Pet Nap 预览</h1>
    <div class="info">
      <p>左边是设置面板（点击工具栏图标弹出）。右边两个是真实猫咪视频预设。</p>
      <small>preview.html 里 popup 不会真的保存设置（因为没有 chrome.storage API），但界面会完整渲染，宠物库里的视频也会自动播放。</small>
      <div class="note">
        ⚠️ 真正的<b>全屏遮罩休息</b>和<b>闲时页面漫游</b>需要装到 Chrome 才能体验。
      </div>
    </div>
  </div>

  <div class="col">
    <div class="frame popup-frame">
      <iframe src="popup.html"></iframe>
    </div>
    <div class="caption">Popup 设置面板</div>
  </div>

  <div class="col">
    <div class="video-frame">
      <video src="presets/19091266-hd_1920_1080_30fps.mp4" muted autoplay loop playsinline></video>
    </div>
    <div class="caption"><b>橘猫 A</b> · 1080p · 4MB</div>

    <div class="video-frame">
      <video src="presets/19787248-uhd_3840_2160_25fps.mp4" muted autoplay loop playsinline></video>
    </div>
    <div class="caption"><b>橘猫 B</b> · 4K · 25MB（建议压到 1080p）</div>
  </div>
</body>
</html>
